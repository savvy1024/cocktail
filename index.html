<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Bar Trainer">
<title>Bar Recipe Trainer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --amber:#FAC775;--amber-t:#412402;--amber-d:#EF9F27;
  --bg:#FAFAF8;--surf:#FFFFFF;--surf2:#F4F2ED;
  --bdr:#E8E6E0;--bdr2:#D0CEC8;
  --t1:#1A1916;--t2:#6B6860;--t3:#A8A69E;
  --green:#1D9E75;--gbg:#E1F5EE;--gt:#085041;
  --red:#A32D2D;--rbg:#FCEBEB;--rbdr:#F09595;
  --orange:#BA7517;--obg:#FAEEDA;--ot:#633806;
  --rad:12px;--rads:8px;--radp:40px;
  --sb:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;color:var(--t1);font-size:16px;}
#app{max-width:430px;margin:0 auto;min-height:100vh;}
.page{padding-bottom:calc(80px + var(--sb));}
.hdr{display:flex;align-items:center;gap:10px;padding:14px 16px 12px;border-bottom:1px solid var(--bdr);background:var(--surf);position:sticky;top:0;z-index:10;}
.hdr h1{flex:1;font-size:18px;font-weight:600;}
.body{padding:12px 16px;}
.sec-lbl{padding:14px 16px 6px;font-size:11px;font-weight:600;color:var(--t2);letter-spacing:.06em;text-transform:uppercase;}
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rad);padding:12px 14px;margin-bottom:10px;}
.card-tap{cursor:pointer;transition:background .1s;}
.card-tap:active{background:var(--surf2);}
.row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--bdr);}
.row:last-child{border-bottom:none;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 14px;border-radius:var(--rads);border:1px solid var(--bdr2);background:transparent;cursor:pointer;font-size:14px;font-family:inherit;color:var(--t1);}
.btn:active{background:var(--surf2);}
.bti{padding:8px;border-radius:var(--rads);}
.bta{background:var(--amber);border:none;color:var(--amber-t);font-weight:600;}
.bta:active{background:var(--amber-d);}
.btp{border-radius:var(--radp);padding:10px 22px;font-size:15px;font-weight:600;}
.btd{border-color:var(--rbdr);color:var(--red);}
.btf{width:100%;justify-content:center;}
.btx{background:var(--surf2)!important;color:var(--t3)!important;cursor:not-allowed!important;}
.fab-w{position:sticky;bottom:calc(20px + var(--sb));display:flex;justify-content:center;}
.fab{box-shadow:0 4px 16px rgba(0,0,0,.14);}
.inp{width:100%;padding:10px 12px;border-radius:var(--rads);border:1px solid var(--bdr2);background:var(--surf);color:var(--t1);font-size:15px;font-family:inherit;outline:none;}
.inp:focus{border-color:var(--amber-d);}
textarea.inp{resize:vertical;line-height:1.6;}
.fg{margin-bottom:16px;}
.lbl{font-size:12px;font-weight:600;color:var(--t2);letter-spacing:.04em;text-transform:uppercase;display:block;margin-bottom:6px;}
.ir{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.ir .inp:first-child{flex:2;}
.ir .inp:nth-child(2){flex:1;}
.badge{display:inline-block;font-size:12px;font-weight:600;padding:3px 11px;border-radius:20px;background:var(--amber);color:var(--amber-t);}
.chips{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:20px;}
.chip{padding:10px 14px;border-radius:var(--radp);border:1.5px solid var(--bdr2);background:var(--surf);font-size:14px;font-family:inherit;cursor:pointer;color:var(--t1);transition:all .12s;-webkit-appearance:none;line-height:1.2;}
.chip:active{transform:scale(.97);}
.chip.sel{background:var(--amber);border-color:var(--amber-d);color:var(--amber-t);font-weight:600;}
.chip.c-ok{background:var(--gbg);border-color:var(--green);color:var(--gt);font-weight:600;cursor:default;}
.chip.c-bad{background:var(--rbg);border-color:var(--red);color:var(--red);font-weight:600;cursor:default;}
.chip.c-miss{background:var(--obg);border-color:var(--orange);color:var(--ot);font-weight:600;cursor:default;}
.chip.c-plain{border-color:var(--bdr);color:var(--t3);cursor:default;}
.prog{height:3px;background:var(--bdr);}
.prog-f{height:100%;background:var(--amber);transition:width .3s;}
.toast{position:fixed;bottom:calc(90px + var(--sb));left:50%;transform:translateX(-50%) translateY(10px);background:#1A1916;color:#fff;font-size:13px;padding:8px 18px;border-radius:var(--radp);opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:999;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.center-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;}
.empty{text-align:center;color:var(--t2);font-size:14px;margin-top:60px;line-height:1.8;}
</style>
</head>
<body>
<div id="app"><div class="center-screen"><p style="color:var(--t2);font-size:14px;">Loading…</p></div></div>
<div class="toast" id="toast"></div>

// ── Utils ────────────────────────────────────────────────────
const genId = () => Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const shuffle = a => [...a].sort(()=>Math.random()-.5);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const ingLabel = i => i.a ? `${i.n}  ·  ${i.a}` : i.n;
let toastT;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2000);}

function genQuiz(cs){
  const allLabels=[...new Set(cs.flatMap(c=>c.ing.map(ingLabel)))];
  return shuffle(cs).map(c=>{
    const correct=c.ing.map(ingLabel);
    const cSet=new Set(correct);
    const pool=shuffle(allLabels.filter(l=>!cSet.has(l)));
    return {name:c.name,cSet,opts:shuffle([...correct,...pool.slice(0,3)])};
  });
}

// ── Firestore helpers ────────────────────────────────────────
const colRef = () => collection(db,'users',S.uid,'cocktails');
const dRef   = id => doc(db,'users',S.uid,'cocktails',id);
const toFS   = ({id,...r}) => r;

async function dbLoad(){
  const snap = await getDocs(colRef());
  if(snap.empty){
    const batch = writeBatch(db);
    for(const c of SEED) batch.set(dRef(c.id), toFS(c));
    await batch.commit();
    return [...SEED];
  }
  return snap.docs.map(d=>({...d.data(),id:d.id}));
}

// ── State ────────────────────────────────────────────────────
let S={
  auth:'loading', uid:null, userName:null, userPhoto:null,
  cocktails:[], view:'list',
  selId:null, editId:null, editForm:null, search:'',
  quiz:null, qIdx:0, qSel:new Set(), qSub:false, qScore:0, qDone:false,
  confirmDel:false,
};

// ── Render ───────────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');
  const {auth,cocktails,selId,editId,quiz,qIdx,qSel,qSub,qScore,qDone,confirmDel,search}=S;

  // Loading
  if(auth==='loading'){
    app.innerHTML=`<div class="center-screen"><p style="color:var(--t2);font-size:14px;">Loading…</p></div>`;
    return;
  }

  // Login
  if(auth==='out'){
    app.innerHTML=`

      <div style="font-size:60px;margin-bottom:20px;">🍹</div>
      <h1 style="font-size:26px;font-weight:700;margin-bottom:10px;">Bar Recipe Trainer</h1>

        Sign in with Google
      </button>
    </div>`;
    return;
  }

  // ── LIST ──
  if(S.view==='list'){
    const fl=search?cocktails.filter(c=>c.name.toLowerCase().includes(search.toLowerCase())):cocktails;
    app.innerHTML=`<div class="page">
      <div class="hdr">
        <h1>🍹 Bar Recipes</h1>
        <button class="btn btp bta${cocktails.length<2?' btx':''}" onclick="${cocktails.length>=2?'window.startQuiz()':''}" style="font-size:13px;padding:8px 16px;">▶ Practice</button>
        <button class="btn bti" onclick="window.doSignOut()" title="Sign out" style="color:var(--t2);">⏏</button>
      </div>
      <div style="padding:10px 16px 4px;">
        <input class="inp" style="background:var(--surf2);border-color:var(--bdr);" placeholder="Search…" value="${esc(search)}" oninput="S.search=this.value;render()">
      </div>
      <p class="sec-lbl">${fl.length} recipes</p>
      <div class="body" style="padding-top:2px;">
        ${fl.length===0?'<p class="empty">No recipes found</p>':fl.map(c=>`
        <div class="card card-tap" style="display:flex;justify-content:space-between;align-items:center;" onclick="window.goDetail('${esc(c.id)}')">
          <div><p style="font-size:15px;font-weight:600;">${esc(c.name)}</p>
          <p style="font-size:12px;color:var(--t2);margin-top:3px;">${esc(c.glass||'—')} · ${c.ing.length} ingredients</p></div>
          <span style="font-size:20px;color:var(--t3);">›</span>
        </div>`).join('')}
      </div>
      <div class="fab-w"><button class="btn btp bta fab" onclick="window.goEdit(null)">＋ Add Recipe</button></div>
    </div>`;
  }

  // ── DETAIL ──
  else if(S.view==='detail'){
    const c=cocktails.find(x=>x.id===selId);if(!c){window.goList();return;}
    app.innerHTML=`<div class="page">
      <div class="hdr">
        <button class="btn bti" onclick="window.goList()">‹</button>
        <h1>${esc(c.name)}</h1>
        <button class="btn bti" onclick="window.goEdit('${esc(c.id)}')">✎</button>
      </div>
      <div class="body">
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;">
          ${c.glass?`<span class="badge">${esc(c.glass)}</span>`:''}
          ${c.garnish&&c.garnish!=='None'?`<span class="badge" style="background:var(--gbg);color:var(--gt);">🌿 ${esc(c.garnish)}</span>`:''}
        </div>
        <p class="lbl">Ingredients</p>
        <div class="card">${c.ing.map(x=>`<div class="row"><span style="font-size:15px;">${esc(x.n)}</span><span style="font-size:15px;font-weight:600;color:var(--t2);">${esc(x.a)}</span></div>`).join('')}</div>
        ${c.method?`<p class="lbl" style="margin-top:16px;">Method</p><div class="card"><p style="font-size:14px;line-height:1.7;">${esc(c.method)}</p></div>`:''}
        <div style="margin-top:24px;">
          ${confirmDel?`<div style="background:var(--rbg);border:1px solid var(--rbdr);border-radius:var(--rad);padding:14px;text-align:center;">
            <p style="color:var(--red);font-size:14px;margin-bottom:12px;">Delete "${esc(c.name)}"?</p>
            <div style="display:flex;gap:10px;">
              <button class="btn btf" onclick="S.confirmDel=false;render()">Cancel</button>
              <button class="btn btf" style="background:var(--red);border:none;color:#fff;font-weight:600;" onclick="window.doDelete('${esc(c.id)}')">Delete</button>
            </div></div>`:`
          <button class="btn btd btf" onclick="S.confirmDel=true;render()">🗑 Delete Recipe</button>`}
        </div>
      </div>
    </div>`;
  }

  // ── EDIT ──
  else if(S.view==='edit'){
    const f=S.editForm;
    const ok=f.name.trim()&&f.ing.some(x=>x.n.trim());
    app.innerHTML=`<div class="page">
      <div class="hdr">
        <button class="btn bti" onclick="window.backEdit()">‹</button>
        <h1>${editId?'Edit Recipe':'New Recipe'}</h1>
        <button id="sbtn" class="btn btp bta${ok?'':' btx'}" onclick="${ok?'window.saveForm()':''}" style="padding:8px 18px;">Save</button>
      </div>
      <div class="body">
        <div class="fg"><span class="lbl">Name *</span>
          <input class="inp" value="${esc(f.name)}" placeholder="e.g. Mojito" oninput="S.editForm.name=this.value;window.checkSave()"></div>
        <div class="fg"><span class="lbl">Glassware</span>
          <input class="inp" value="${esc(f.glass)}" placeholder="e.g. Collins Glass" oninput="S.editForm.glass=this.value"></div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <span class="lbl">Ingredients *</span>
          <button class="btn" style="font-size:13px;padding:5px 12px;" onclick="window.addIng()">＋ Add</button>
        </div>
        <div id="ing-list">${f.ing.map((x,i)=>iRow(x,i,f.ing.length)).join('')}</div>
        <div class="fg" style="margin-top:8px;"><span class="lbl">Method</span>
          <textarea class="inp" rows="3" oninput="S.editForm.method=this.value" placeholder="How to make it…">${esc(f.method)}</textarea></div>
        <div class="fg"><span class="lbl">Garnish</span>
          <input class="inp" value="${esc(f.garnish)}" placeholder="e.g. Lime Wheel" oninput="S.editForm.garnish=this.value"></div>
      </div>
    </div>`;
  }

  // ── QUIZ ──
  else if(S.view==='quiz'){
    if(qDone){
      const tot=quiz.length,pct=Math.round(qScore/tot*100);
      const g=pct>=80?{i:'🏆',m:'Excellent!',c:'#854F0B',b:'#FAC775'}:pct>=50?{i:'👍',m:'Good job!',c:'#0F6E56',b:'#9FE1CB'}:{i:'💪',m:'Keep practicing!',c:'#534AB7',b:'#CECBF6'};
      app.innerHTML=`<div class="center-screen">
        <div style="width:72px;height:72px;border-radius:50%;background:${g.b};display:flex;align-items:center;justify-content:center;font-size:34px;margin-bottom:16px;">${g.i}</div>
        <p style="font-size:40px;font-weight:700;margin-bottom:4px;">${qScore}/${tot}</p>
        <p style="font-size:14px;color:var(--t2);margin-bottom:6px;">Accuracy ${pct}%</p>
        <p style="font-size:18px;font-weight:600;color:${g.c};margin-bottom:32px;">${g.m}</p>
        <button class="btn btp bta" onclick="window.goList()" style="font-size:15px;">Back to Recipes</button>
      </div>`;
      return;
    }
    const q=quiz[qIdx];
    const chips=q.opts.map(name=>{
      if(!qSub){return `<button class="chip${qSel.has(name)?' sel':''}" onclick="window.toggleChip('${esc(name)}')">${esc(name)}</button>`;}
      const inC=q.cSet.has(name),wasSel=qSel.has(name);
      const cls=inC&&wasSel?'ok':!inC&&wasSel?'bad':inC&&!wasSel?'miss':'plain';
      return `<button class="chip c-${cls}">${esc(name)}${cls==='ok'?' ✓':cls==='bad'?' ✗':cls==='miss'?' ←':''}</button>`;
    }).join('');
    const wrong=[...qSel].filter(n=>!q.cSet.has(n));
    const missed=[...q.cSet].filter(n=>!qSel.has(n));
    const perfect=qSub&&wrong.length===0&&missed.length===0;
    app.innerHTML=`<div class="page">
      <div class="hdr" style="justify-content:space-between;">
        <button class="btn bti" onclick="window.goList()">✕</button>
        <span style="font-size:14px;font-weight:600;">⭐ ${qScore} pts</span>
        <span style="font-size:13px;color:var(--t2);">${qIdx+1} / ${quiz.length}</span>
      </div>
      <div class="prog"><div class="prog-f" style="width:${(qIdx/quiz.length)*100}%;"></div></div>
      <div class="body" style="padding-top:22px;">
        <p style="font-size:11px;font-weight:600;color:var(--t2);letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px;">Select ALL ingredients for</p>
        <h2 style="font-size:26px;margin-bottom:6px;">${esc(q.name)}</h2>
        <p style="font-size:12px;color:var(--t3);margin-bottom:20px;">Must be exact — no more, no less.</p>
        <div class="chips">${chips}</div>
        ${qSub?`
          <div style="background:${perfect?'var(--gbg)':'var(--rbg)'};border:1px solid ${perfect?'var(--green)':'var(--rbdr)'};border-radius:var(--rad);padding:12px 14px;color:${perfect?'var(--gt)':'var(--red)'};font-weight:600;margin-bottom:12px;">
            ${perfect?'✓ Perfect! All correct.':`✗ ${[wrong.length?`${wrong.length} wrong`:'',(missed.length?`${missed.length} missed`:'')].filter(Boolean).join(', ')}`}
          </div>
          <div style="display:flex;gap:12px;font-size:12px;color:var(--t2);margin-bottom:16px;">
            <span style="color:var(--gt);">✓ Correct</span><span style="color:var(--red);">✗ Wrong</span><span style="color:var(--orange);">← Missed</span>
          </div>
          <button class="btn btp bta btf" onclick="window.nextQ()" style="font-size:15px;padding:13px 0;">${qIdx+1>=quiz.length?'See Results →':'Next →'}</button>`:`
          <button class="btn btp bta btf${qSel.size===0?' btx':''}" onclick="${qSel.size>0?'window.submitQ()':''}" style="font-size:15px;padding:13px 0;">Submit Answer</button>`}
      </div>
    </div>`;
  }
}

// ── Helper ───────────────────────────────────────────────────
function iRow(x,i,tot){
  return `<div class="ir">
    <input class="inp" type="text" placeholder="Ingredient" value="${esc(x.n)}" oninput="S.editForm.ing[${i}].n=this.value;window.checkSave()">
    <input class="inp" type="text" placeholder="Amount" value="${esc(x.a)}" oninput="S.editForm.ing[${i}].a=this.value">
    ${tot>1?`<button class="btn" style="color:var(--red);border-color:var(--rbdr);padding:9px 10px;flex-shrink:0;" onclick="window.delIng(${i})">✕</button>`:''}
  </div>`;
}

// ── Actions ──────────────────────────────────────────────────
function goList(){S.view='list';S.confirmDel=false;render();}
function goDetail(id){S.selId=id;S.view='detail';S.confirmDel=false;render();}
function goEdit(id){
  S.editId=id;
  const c=id?S.cocktails.find(x=>x.id===id):null;
  S.editForm=c?{name:c.name,glass:c.glass||'',ing:c.ing.map(x=>({...x})),method:c.method||'',garnish:c.garnish||''}:{name:'',glass:'',ing:[{n:'',a:''}],method:'',garnish:''};
  S.view='edit';render();
}
function backEdit(){S.view=S.editId?'detail':'list';render();}
function checkSave(){
  const ok=S.editForm.name.trim()&&S.editForm.ing.some(x=>x.n.trim());
  const b=document.getElementById('sbtn');
  if(b){b.classList.toggle('btx',!ok);b.onclick=ok?window.saveForm:null;}
}
function addIng(){
  S.editForm.ing.push({n:'',a:''});
  const l=document.getElementById('ing-list');
  if(l){const d=document.createElement('div');d.innerHTML=iRow({n:'',a:''},S.editForm.ing.length-1,S.editForm.ing.length);l.appendChild(d.firstChild);}
}
function delIng(i){
  S.editForm.ing.splice(i,1);
  const l=document.getElementById('ing-list');
  if(l)l.innerHTML=S.editForm.ing.map((x,j)=>iRow(x,j,S.editForm.ing.length)).join('');
  checkSave();
}
async function saveForm(){
  const f=S.editForm;
  if(!f.name.trim()||!f.ing.some(x=>x.n.trim()))return;
  const clean={name:f.name.trim(),glass:f.glass.trim(),ing:f.ing.filter(x=>x.n.trim()),method:f.method.trim(),garnish:f.garnish.trim()};
  const isNew=!S.editId;
  const id=S.editId||genId();
  const cocktail={id,...clean};
  if(!isNew) S.cocktails=S.cocktails.map(c=>c.id===S.editId?cocktail:c);
  else S.cocktails.push(cocktail);
  S.selId=id; S.view=S.editId?'detail':'list'; render();
  toast(isNew?'Recipe added ✓':'Saved ✓');
  try{ await setDoc(dRef(id),toFS(cocktail)); }
  catch(e){ toast('Sync failed — check connection'); }
}
async function doDelete(id){
  S.cocktails=S.cocktails.filter(c=>c.id!==id);
  goList(); toast('Deleted');
  try{ await deleteDoc(dRef(id)); }
  catch(e){ toast('Sync failed — check connection'); }
}
function startQuiz(){S.quiz=genQuiz(S.cocktails);S.qIdx=0;S.qSel=new Set();S.qSub=false;S.qScore=0;S.qDone=false;S.view='quiz';render();}
function toggleChip(n){if(S.qSub)return;S.qSel.has(n)?S.qSel.delete(n):S.qSel.add(n);render();}
function submitQ(){if(S.qSel.size===0)return;S.qSub=true;const q=S.quiz[S.qIdx];const ok=[...q.cSet].every(n=>S.qSel.has(n))&&[...S.qSel].every(n=>q.cSet.has(n));if(ok)S.qScore++;render();}
function nextQ(){if(S.qIdx+1>=S.quiz.length){S.qDone=true;render();return;}S.qIdx++;S.qSel=new Set();S.qSub=false;render();}

async function signIn(){
  try{ await signInWithPopup(auth,gp); }
  catch(e){ toast('Sign in failed. Please try again.'); }
}
async function doSignOut(){
  await signOut(auth);
}

// ── Expose to global scope (required for onclick in module) ──
window.goList=goList; window.goDetail=goDetail; window.goEdit=goEdit;
window.backEdit=backEdit; window.checkSave=checkSave; window.addIng=addIng;
window.delIng=delIng; window.saveForm=saveForm; window.doDelete=doDelete;
window.startQuiz=startQuiz; window.toggleChip=toggleChip;
window.submitQ=submitQ; window.nextQ=nextQ;
window.signIn=signIn; window.doSignOut=doSignOut;
window.S=S; window.render=render;

// ── Auth listener ────────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  if(user){
    S.uid=user.uid; S.userName=user.displayName; S.userPhoto=user.photoURL;
    S.auth='in'; render();
    try{
      S.cocktails = await dbLoad();
      render();
    } catch(e){
      toast('Failed to load recipes');
    }
  } else {
    S.auth='out'; S.uid=null; S.cocktails=[];
    render();
  }
});
</script>
</body>
</html>
